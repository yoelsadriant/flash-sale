include classpath("application.conf")

node-address {
  protocol = http
  host = "*"
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits = strict
}

queues {
  PurchaseDLQ {}
  PurchaseQueue {
    defaultVisibilityTimeout = 60 seconds
    deadLettersQueue {
      name = "PurchaseDLQ"
      maxReceiveCount = 3
    }
  }
}
